services:
  llama:
    build:
      context: .
      dockerfile: llama.Dockerfile
    container_name: llama
    volumes:
      - ../models:/models
      - /usr/lib/wsl/lib:/usr/local/cuda/compat
    ports:
      - "8080:8080"
    command:
      - /llama.cpp/build/bin/llama-server
      - --model
      - /models/llama-3.1-8b-instruct-q4_k_m.gguf
      - --ctx-size
      - "8192"
      - --n-gpu-layers
      - "999"
      - --threads
      - "8"
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]


  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - ../data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
